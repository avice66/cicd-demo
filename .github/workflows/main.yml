name: CI Security, Testing and Docker Build

on: [push]

jobs:
  # --- СТАДИЯ LINT ---
  bash_lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Bash Lint
        run: shellcheck deploy.sh

  yaml_lint:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run YAML Lint
        run: yamllint .

  # --- СТАДИЯ TEST ---
  python_unit_test:
    runs-on: [self-hosted, Linux, X64]
    needs: [bash_lint, yaml_lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Python Unit Tests
        run: pytest-3 test_app.py

  # --- СТАДИЯ BUILD ---
  docker_build:
    runs-on: [self-hosted, build]
    needs: python_unit_test
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/avice66/cicd-demo:latest \
            -t ghcr.io/avice66/cicd-demo:${{ github.run_number }} .

      - name: Push Docker Image to Registry
        run: |
          docker push ghcr.io/avice66/cicd-demo:latest
          docker push ghcr.io/avice66/cicd-demo:${{ github.run_number }}
