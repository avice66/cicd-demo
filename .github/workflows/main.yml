name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cicd-demo:latest

  deploy-to-staging:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Staging Deploy
        run: |
          echo "Connecting to 172.17.2.116..."
          echo "Deploying container my-python-staging-app on port 80... Success!"

  deploy-to-prod:
    needs: [deploy-to-staging]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Simulate Production Deploy
        run: |
          echo "Connecting to 172.17.2.117..."
          echo "Deploying container my-python-prod-app on port 8080... Success!"
