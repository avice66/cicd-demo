name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cicd-demo:latest

  deploy_review:
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: review/pr-${{ github.event.number }}
    steps:
      - name: Deploy Review App to Test Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: devops_engineer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PORT=8000
            while nc -z localhost $PORT; do
              PORT=$((PORT+1))
              if [ $PORT -gt 8100 ]; then
                echo "Error: No free ports in range 8000-8100"
                exit 1
              fi
            done
            echo "Found free port: $PORT"
            CONTAINER_NAME="my-app-pr-${{ github.event.number }}"
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            docker run -d --name $CONTAINER_NAME -p $PORT:5000 ghcr.io/${{ github.repository_owner }}/cicd-demo:latest
  # Новая джоба очистки динамического окружения по ТЗ
  stop_review:
    # Запускается при закрытии Pull Request
    if: github.event.name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    # КРИТИЧНО: Связываем с тем же окружением и указываем action: teardown (очистка)
    environment:
      name: review/pr-${{ github.event.number }}
      action: teardown

    steps:
      - name: Stop and Remove Review App from Test Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: devops_engineer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Формируем то же самое уникальное имя контейнера по номеру PR
            CONTAINER_NAME="my-app-pr-${{ github.event.number }}"
            echo "Stopping and removing container: $CONTAINER_NAME"
            # 2. Жестко удаляем контейнер, освобождая порт в диапазоне 8000-8100
            docker rm -f $CONTAINER_NAME || true

  deploy-to-staging:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Simulate Staging Deploy
        run: |
          echo "Connecting to 172.17.2.116..."
          echo "Deploying container my-python-staging-app on port 80... Success!"

  deploy-to-prod:
    needs: [deploy-to-staging]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Simulate Production Deploy
        run: |
          echo "Connecting to 172.17.2.117..."
          echo "Deploying container my-python-prod-app on port 8080... Success!"
