name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Стадия сборки (Build), без которой деплой выдаст ошибку
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cicd-demo:latest

  # Раздел 1. Тестовый деплой (Staging)
  deploy-to-staging:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://${{ secrets.TARGET_HOST }}
    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TARGET_HOST }}
          username: devops_engineer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop my-python-staging-app || true
            docker rm my-python-staging-app || true
            docker run -d --name my-python-staging-app -p 80:5000 ghcr.io/${{ github.repository_owner }}/cicd-demo:latest

  # Раздел 2. Деплой на Production с ручным триггером (Порт 8080)
  deploy-to-prod:
    needs: [deploy-to-staging]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ secrets.PROD_TARGET_HOST }}:8080
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_TARGET_HOST }}
          username: devops_engineer
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            docker stop my-python-prod-app || true
            docker rm my-python-prod-app || true
            docker pull ghcr.io/${{ github.repository_owner }}/cicd-demo:latest || true
            docker run -d --name my-python-prod-app -p 8080:5000 ghcr.io/${{ github.repository_owner }}/cicd-demo:latest
