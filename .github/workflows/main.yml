name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cicd-demo:latest

  deploy_review:
    needs: [build]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: review/pr-${{ github.event.number }}
    steps:
      - name: Simulate Deploy Review App to Test Server
        run: |
          echo "Connecting to Target-Server via SSH: 172.17.2.116..."
          echo "Scanning ports in range 8000-8100..."
          
          # Симулируем логику автоматического поиска первого свободного порта
          PORT=8000
          echo "Checking port $PORT... Status: FREE"
          echo "Found free port: $PORT"
          
          # Формируем динамическое уникальное имя контейнера по ТЗ
          CONTAINER_NAME="my-app-pr-${{ github.event.number }}"
          echo "Target container name: $CONTAINER_NAME"
          
          echo "Stopping old review containers if exist..."
          echo "Running Docker command:"
          echo "docker run -d --name $CONTAINER_NAME -p $PORT:5000 ghcr.io/${{ github.repository_owner }}/cicd-demo:latest"
          echo "Review application successfully deployed to dynamic environment!"

  stop_review:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment:
      name: review/pr-${{ github.event.number }}
    steps:
      - name: Simulate Stop and Remove Review App
        run: |
          echo "Connecting to Target-Server via SSH: 172.17.2.116..."
          CONTAINER_NAME="my-app-pr-${{ github.event.number }}"
          echo "Executing command: docker rm -f $CONTAINER_NAME"
          echo "Dynamic environment successfully cleaned up and port released!"
